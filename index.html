  <section class="hud">
    <h1>中和村 InSAR 预测滑移区三维地形叠加</h1>
    <p>底图为卫星影像纹理，彩色半透明区域为 InSAR 初步预测滑移区，贴附在 DEM 三维地形上。它不是现场确认滑坡边界。</p>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const data = JSON.parse(document.getElementById('terrain-data').textContent);
    const root = document.getElementById('app');
    const status = document.getElementById('status');
    const overlayToggle = document.getElementById('overlayToggle');
    const overlayOpacity = document.getElementById('overlayOpacity');
    const rotateToggle = document.getElementById('rotateToggle');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1210);
    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 1, 60000);

    renderer.outputColorSpace = THREE.SRGBColorSpace;
    root.appendChild(renderer.domElement);

    const width = data.grid.width;
    const height = data.grid.height;
    const xSize = data.grid.x_size_m;
    const ySize = data.grid.y_size_m;
    const zScale = data.grid.z_exaggeration;
    const zMin = data.grid.elevation_min_m;
    const elevations = data.grid.elevation_m;
    const geometry = new THREE.PlaneGeometry(xSize, ySize, width - 1, height - 1);
    geometry.rotateX(-Math.PI / 2);
    const pos = geometry.attributes.position;
    const colors = [];
    const color = new THREE.Color();
    for (let i = 0; i < pos.count; i += 1) {

      pos.setY(i, z);
      const n = Math.max(0, Math.min(1, (elevations[row * width + col] - data.grid.elevation_min_m) / Math.max(1, data.grid.elevation_max_m - data.grid.elevation_min_m)));
      color.setHSL(0.28 - n * 0.16, 0.42, 0.27 + n * 0.35);

    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.computeVertexNormals();
    let terrainMaterial;
    if (data.imagery_rgb && data.imagery_rgb.length === width * height * 3) {
      const imageryCanvas = document.createElement('canvas');
      imageryCanvas.width = width;
      imageryCanvas.height = height;
      const ictx = imageryCanvas.getContext('2d');
      const img = ictx.createImageData(width, height);
      for (let i = 0; i < width * height; i += 1) {
        img.data[i * 4 + 0] = data.imagery_rgb[i * 3 + 0];
        img.data[i * 4 + 1] = data.imagery_rgb[i * 3 + 1];
        img.data[i * 4 + 2] = data.imagery_rgb[i * 3 + 2];
        img.data[i * 4 + 3] = 255;

      ictx.putImageData(img, 0, 0);
      const imageryTexture = new THREE.CanvasTexture(imageryCanvas);
      imageryTexture.colorSpace = THREE.SRGBColorSpace;

    }

    scene.add(overlayGroup);
    let overlayMesh = null;
    function terrainZ(x, y) {
      const col = Math.round((x / xSize + 0.5) * (width - 1));
      const row = Math.round((y / ySize + 0.5) * (height - 1));
      const idx = Math.max(0, Math.min(height - 1, row)) * width + Math.max(0, Math.min(width - 1, col));
      return (elevations[idx] - zMin) * zScale + 18;
    }

      (data.overlay_rgba && data.overlay_rgba.length === width * height * 4) ||
      (data.overlay_alpha && data.overlay_alpha.length === width * height)

      overlayCanvas.width = width;
      overlayCanvas.height = height;
      const ctx = overlayCanvas.getContext('2d');
      const image = ctx.createImageData(width, height);
      if (data.overlay_rgba && data.overlay_rgba.length === width * height * 4) {

        focusZ += -y;

      focusX /= data.cells.items.length;
      focusZ /= data.cells.items.length;
